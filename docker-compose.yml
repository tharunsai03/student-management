version: "3"

services:
  mongo:
    image: mongo
    ports:
      - "27017:27017"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      - mongo
    environment:
      - MONGO_URI=mongodb://mongo:27017/myAppDB

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend